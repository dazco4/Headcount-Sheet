function calcFin(){
  const leaders=getLeaders();
  const byLeader={};
  leaders.forEach(l=>{byLeader[l.id]={CAC:0,COGS:0,'G&A':0,OpEx:0,headcount:0,onLeave:0,openReqs:0,poor:0,attrition:0,negAttrition:0,posAttrition:0,promoAttrition:0};});
  const cacByType={},cogsByType={},gaByType={},opexByType={};
  const byTeam={};
  state.teamTags.forEach(t=>{byTeam[t]={CAC:0,COGS:0,'G&A':0,OpEx:0,headcount:0,poor:0,attrition:0};});
  let tCAC=0,tCOGS=0,tGA=0,tOpEx=0,tHC=0,tLeave=0,tPoor=0,tAttr=0,tNegAttr=0,tPosAttr=0,tPromoAttr=0,tReqs=0;
  let cacInbSales=0,cacOutbSales=0,cacMktg=0,cacShared=0;
  state.employees.forEach(e=>{
    const fl=empFL(e);tHC++;
    if(e.onLeave)tLeave++;
    if(e.performance==='Poor')tPoor++;
    if(e.attrition){tAttr++;if(e.attrition==='Negative Attrition')tNegAttr++;else if(e.attrition==='Positive Attrition')tPosAttr++;else if(e.attrition==='Promotion Attrition')tPromoAttr++;}
    [[e.c1,e.w1,e.t1,e.ch1],[e.c2,e.w2,e.t2,e.ch2],[e.c3,e.w3,e.t3,e.ch3]].forEach(([c,w,t,ch])=>{
      if(!c||!w)return;
      const amt=fl*(w/100),tk=t||'(untagged)';
      if(c==='CAC'){tCAC+=amt;cacByType[tk]=(cacByType[tk]||0)+amt;
        if(ch==='Inbound')cacInbSales+=amt;
        else if(ch==='Outbound')cacOutbSales+=amt;
        else if(tk==='Marketing')cacMktg+=amt;
        else cacShared+=amt;
      }else if(c==='COGS'){tCOGS+=amt;cogsByType[tk]=(cogsByType[tk]||0)+amt;}
      else if(c==='G&A'){tGA+=amt;gaByType[tk]=(gaByType[tk]||0)+amt;}
      else if(c==='OpEx'){tOpEx+=amt;opexByType[tk]=(opexByType[tk]||0)+amt;}
    });
    if(byLeader[e.leaderId]){
      const bl=byLeader[e.leaderId];
      [[e.c1,e.w1],[e.c2,e.w2],[e.c3,e.w3]].forEach(([c,w])=>{if(!c||!w)return;const amt=fl*(w/100);if(c==='CAC')bl.CAC+=amt;else if(c==='COGS')bl.COGS+=amt;else if(c==='G&A')bl['G&A']+=amt;else if(c==='OpEx')bl.OpEx+=amt;});
      bl.headcount++;if(e.onLeave)bl.onLeave++;if(e.performance==='Poor')bl.poor++;
      if(e.attrition){bl.attrition++;if(e.attrition==='Negative Attrition')bl.negAttrition++;else if(e.attrition==='Positive Attrition')bl.posAttrition++;else if(e.attrition==='Promotion Attrition')bl.promoAttrition++;}
    }
    const tags=e.teamTags||[];
    if(tags.length>0){
      const perTag=1/tags.length;
      tags.forEach(tag=>{
        if(!byTeam[tag])byTeam[tag]={CAC:0,COGS:0,'G&A':0,OpEx:0,headcount:0,poor:0,attrition:0};
        [[e.c1,e.w1],[e.c2,e.w2],[e.c3,e.w3]].forEach(([c,w])=>{if(!c||!w)return;const amt=fl*(w/100)*perTag;if(c==='CAC')byTeam[tag].CAC+=amt;else if(c==='COGS')byTeam[tag].COGS+=amt;else if(c==='G&A')byTeam[tag]['G&A']+=amt;else if(c==='OpEx')byTeam[tag].OpEx+=amt;});
        byTeam[tag].headcount+=perTag;if(e.performance==='Poor')byTeam[tag].poor+=perTag;if(e.attrition)byTeam[tag].attrition+=perTag;
      });
    }
  });
  state.reqs.forEach(r=>{tReqs++;if(byLeader[r.leaderId])byLeader[r.leaderId].openReqs++;});
  const inbR=state.dealsTotal>0?(state.dealsInbound||0)/state.dealsTotal:0;
  const outbR=state.dealsTotal>0?(state.dealsOutbound||0)/state.dealsTotal:0;
  const inbCacAnn=cacInbSales+cacMktg+cacShared*inbR;
  const outbCacAnn=cacOutbSales+cacShared*outbR;
  const div=state.dealPeriod==='monthly'?12:1;
  const cacPer=tCAC/div,cacInbPer=inbCacAnn/div,cacOutbPer=outbCacAnn/div;
  const cacPerDeal=state.dealsTotal>0?(cacPer/state.dealsTotal)+state.perDealCac:null;
  const cacInbPerDeal=state.dealsInbound>0?(cacInbPer/state.dealsInbound)+state.perDealCac:null;
  const cacOutbPerDeal=state.dealsOutbound>0?(cacOutbPer/state.dealsOutbound)+state.perDealCac:null;
  const gtmGmHit=state.arr>0?(tCOGS/state.arr)*100:0;
  const totalGmHit=gtmGmHit+(state.otherGmHitPct||0);
  const gmPct=Math.max(0,1-totalGmHit/100);
  function pb(cac,arpu){if(!cac||!arpu||!gmPct||gmPct<=0)return null;return cac/(arpu*gmPct/12);}
  return{byLeader,byTeam,cacByType,cogsByType,gaByType,opexByType,tCAC,tCOGS,tGA,tOpEx,tHC,tLeave,tPoor,poorPct:pct(tPoor,tHC),tAttr,tNegAttr,tPosAttr,tPromoAttr,tReqs,totalSpend:tCAC+tCOGS+tGA+tOpEx,gtmGmHit,totalGmHit,gmPct,cacInbSales,cacOutbSales,cacMktg,cacShared,inbCacAnn,outbCacAnn,cacPer,cacInbPer,cacOutbPer,cacPerDeal,cacInbPerDeal,cacOutbPerDeal,paybackAvg:pb(cacPerDeal,state.arpuAvg),paybackInb:pb(cacInbPerDeal,state.arpuInbound),paybackOutb:pb(cacOutbPerDeal,state.arpuOutbound),inbR,outbR,leaders};
}

    <div class="stat" style="border-top-color:var(--g600)"><div class="stat-lbl">Total G&amp;A</div><div class="stat-val">${fmtK(fin.tGA)}</div><div class="stat-sub">${fmtK(fin.tGA/12)}/mo</div></div>

      <div class="panel-foot"><span style="color:var(--g400)">Monthly</span><span style="font-family:monospace;color:var(--g600)">${fmtK(fin.tGA/12)}/mo</span></div>

      <div class="panel-foot"><span style="color:var(--g400)">Monthly</span><span style="font-family:monospace;color:var(--g600)">${fmtK(fin.tOpEx/12)}/mo</span></div>
    </div>
    <div class="panel"><div class="panel-hdr"><span class="panel-ttl">Attrition Risk</span><span class="panel-tot" style="color:var(--amber)">${atRisk.length} flagged</span></div>
      ${riskRows||'<div style="font-size:11px;color:var(--g400)">No flags</div>'}

  <div class="card">
    <div class="card-hdr"><span class="card-ttl">Cost by Kev Direct</span><span class="card-note">Annual fully loaded</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Org</th><th>Leader</th><th class="r">HC</th><th class="r" style="color:var(--red)">Neg</th><th class="r" style="color:var(--green)">Pos</th><th class="r" style="color:var(--blue)">Promo</th><th class="r">Poor%</th><th class="r">CAC</th><th class="r">COGS</th><th class="r">G&amp;A</th><th class="r" style="color:var(--purple)">OpEx</th><th class="r">Total FL</th></tr></thead>

function setPeriod(p){state.dealPeriod=p;persist();renderMain();}
function renderAttritionTab(){
  const leaders=getLeaders();
  const flagged=state.employees.filter(e=>e.attrition).filter(e=>{
    if(state.attrSearch&&!e.name.toLowerCase().includes(state.attrSearch.toLowerCase()))return false;
    if(state.attrFilterType!=='all'&&e.attrition!==state.attrFilterType)return false;
    if(state.attrFilterOrg!=='all'&&e.leaderId!==state.attrFilterOrg)return false;
    return true;
  });
  const logFiltered=state.attritionLog.filter(e=>{
    if(state.attrSearch&&!e.name.toLowerCase().includes(state.attrSearch.toLowerCase()))return false;
    if(state.attrFilterType!=='all'&&e.attritionType!==state.attrFilterType)return false;
    if(state.attrFilterOrg!=='all'&&e.leaderId!==state.attrFilterOrg)return false;
    return true;
  });
  const negC=state.employees.filter(e=>e.attrition==='Negative Attrition').length;
  const posC=state.employees.filter(e=>e.attrition==='Positive Attrition').length;
  const proC=state.employees.filter(e=>e.attrition==='Promotion Attrition').length;
  const lNeg=state.attritionLog.filter(e=>e.attritionType==='Negative Attrition').length;
  const lPos=state.attritionLog.filter(e=>e.attritionType==='Positive Attrition').length;
  const lPro=state.attritionLog.filter(e=>e.attritionType==='Promotion Attrition').length;
  const flaggedRows=flagged.map((e,i)=>{
    const leader=leaders.find(l=>l.id===e.leaderId);
    const tc=e.attrition==='Negative Attrition'?'bg-red':e.attrition==='Positive Attrition'?'bg-green':'bg-blue';
    const bg=i%2===0?'#fff':'#fafafa';
    return`<tr>
      <td style="background:${bg};font-weight:500">${esc(e.name)}</td>
      <td style="background:${bg};color:var(--g600);font-size:11px">${esc(e.role)}</td>
      <td style="background:${bg};color:var(--g600);font-size:11px">${esc(leader?.label||'')}</td>
      <td style="background:${bg}"><span class="badge ${tc}">${esc(e.attrition)}</span></td>
      <td style="background:${bg};font-size:11px;color:var(--g600);max-width:220px">${esc(e.notes)||'--'}</td>
      <td style="background:${bg}"><div style="display:flex;gap:4px">
        <button class="btn-ghost" onclick="editEmp('${e.id}')">Edit</button>
        <button class="btn btn-sm" style="background:var(--red-bg);color:var(--red);border:none;font-size:10px;padding:3px 8px;border-radius:5px" onclick="logAttrition('${e.id}')">Log Exit</button>
      </div></td>
    </tr>`;
  }).join('');
  const logRows=logFiltered.map((entry,i)=>{
    const leader=leaders.find(l=>l.id===entry.leaderId);
    const tc=entry.attritionType==='Negative Attrition'?'bg-red':entry.attritionType==='Positive Attrition'?'bg-green':'bg-blue';
    const bg=i%2===0?'#fff':'#fafafa';
    return`<tr>
      <td style="background:${bg};font-weight:500">${esc(entry.name)}</td>
      <td style="background:${bg};color:var(--g600);font-size:11px">${esc(entry.role)}</td>
      <td style="background:${bg};color:var(--g600);font-size:11px">${esc(leader?.label||entry.leaderId||'')}</td>
      <td style="background:${bg}"><span class="badge ${tc}">${esc(entry.attritionType)}</span></td>
      <td style="background:${bg};font-family:monospace;font-size:11px;color:var(--g600)">${esc(entry.exitDate)||'--'}</td>
      <td style="background:${bg};font-size:11px;color:var(--g600);max-width:220px">${esc(entry.reason)||'--'}</td>
      <td style="background:${bg}"><div style="display:flex;gap:4px">
        <button class="btn-ghost" onclick="editLogEntry('${entry.id}')">Edit</button>
        <button class="btn-danger" onclick="deleteLogEntry('${entry.id}')">x</button>
      </div></td>
    </tr>`;
  }).join('');
  const orgOpts=leaders.map(l=>`<option value="${l.id}"${state.attrFilterOrg===l.id?' selected':''}>${esc(l.label)}</option>`).join('');
  return`
  <div class="page-header">
    <div><div class="page-title">Attrition</div><div class="page-sub">Active flags &middot; departed employee log &middot; exit notes</div></div>
    <button class="btn btn-primary btn-sm" onclick="showAddLogModal()">+ Log Departure</button>
  </div>
  <div class="stat-grid" style="grid-template-columns:repeat(auto-fit,minmax(130px,1fr))">
    <div class="stat" style="border-top-color:var(--red)"><div class="stat-lbl">Neg (Active)</div><div class="stat-val" style="color:var(--red)">${negC}</div><div class="stat-sub">${lNeg} in log</div></div>
    <div class="stat" style="border-top-color:var(--green)"><div class="stat-lbl">Pos (Active)</div><div class="stat-val" style="color:var(--green)">${posC}</div><div class="stat-sub">${lPos} in log</div></div>
    <div class="stat" style="border-top-color:var(--blue)"><div class="stat-lbl">Promo (Active)</div><div class="stat-val" style="color:var(--blue)">${proC}</div><div class="stat-sub">${lPro} in log</div></div>
    <div class="stat" style="border-top-color:var(--amber)"><div class="stat-lbl">Total Flagged</div><div class="stat-val">${negC+posC+proC}</div><div class="stat-sub">${lNeg+lPos+lPro} departed</div></div>
  </div>
  <div class="controls">
    <input type="text" class="search-inp" placeholder="Search name..." value="${esc(state.attrSearch)}" oninput="setAttrSearch(this.value)">
    <select onchange="setAttrFilterType(this.value)">
      <option value="all"${state.attrFilterType==='all'?' selected':''}>All Types</option>
      ${ATTR_TYPES.filter(Boolean).map(a=>`<option value="${a}"${state.attrFilterType===a?' selected':''}>${a}</option>`).join('')}
    </select>
    <select onchange="setAttrFilterOrg(this.value)">
      <option value="all"${state.attrFilterOrg==='all'?' selected':''}>All Orgs</option>
      ${orgOpts}
    </select>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-ttl">Active Flags (${flagged.length})</span><span class="card-note">Click "Log Exit" when they depart</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Employee</th><th>Role</th><th>Org</th><th>Type</th><th>Notes</th><th></th></tr></thead>
      <tbody>${flaggedRows||'<tr><td colspan="6" style="text-align:center;color:var(--g400);padding:24px">No active flags</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="card">
    <div class="card-hdr"><span class="card-ttl">Attrition Log (${state.attritionLog.length})</span><span class="card-note">Departed employees with exit notes</span></div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Name</th><th>Role</th><th>Org</th><th>Type</th><th>Exit Date</th><th>Reason</th><th></th></tr></thead>
      <tbody>${logRows||'<tr><td colspan="7" style="text-align:center;color:var(--g400);padding:24px">No log entries yet</td></tr>'}</tbody>
    </table></div>
  </div>`;
}
function logAttrition(empId){
  const emp=state.employees.find(e=>e.id===empId);if(!emp)return;
  showModal(`<div class="modal modal-sm">
    <div class="modal-hdr"><span class="modal-ttl">Log Exit: ${esc(emp.name)}</span><button class="modal-x" onclick="closeModal()">x</button></div>
    <div class="modal-body">
      <p style="font-size:12px;color:var(--g600)">Moves to log and clears flag. Employee stays in roster.</p>
      <div class="fg"><label class="flbl">Type</label><select id="log-type">${ATTR_TYPES.filter(Boolean).map(a=>`<option value="${a}"${a===emp.attrition?' selected':''}>${a}</option>`).join('')}</select></div>
      <div class="fg"><label class="flbl">Exit Date</label><input type="date" id="log-date" value="${new Date().toISOString().slice(0,10)}"></div>
      <div class="fg"><label class="flbl">Reason / Notes</label><textarea id="log-reason" rows="3">${esc(emp.notes||'')}</textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveLogEntry('${emp.id}')">Log Exit</button></div>
  </div>`);
}
function saveLogEntry(empId){
  const emp=state.employees.find(e=>e.id===empId);if(!emp)return;
  state.attritionLog.unshift({id:uid(),empId,name:emp.name,role:emp.role,leaderId:emp.leaderId,attritionType:document.getElementById('log-type')?.value||emp.attrition,exitDate:document.getElementById('log-date')?.value||'',reason:document.getElementById('log-reason')?.value||'',loggedAt:new Date().toISOString()});
  state.employees=state.employees.map(e=>e.id===empId?{...e,attrition:''}:e);
  persist();closeModal();render();showToast('Exit logged for '+emp.name);
}
function showAddLogModal(){
  const leaders=getLeaders();
  showModal(`<div class="modal modal-sm">
    <div class="modal-hdr"><span class="modal-ttl">Log Departure</span><button class="modal-x" onclick="closeModal()">x</button></div>
    <div class="modal-body">
      <div class="fg"><label class="flbl">Name *</label><input type="text" id="log-name"></div>
      <div class="frow f2">
        <div class="fg"><label class="flbl">Role</label><input type="text" id="log-role"></div>
        <div class="fg"><label class="flbl">Org</label><select id="log-org">${leaders.map(l=>`<option value="${l.id}">${esc(l.label)}</option>`).join('')}</select></div>
      </div>
      <div class="frow f2">
        <div class="fg"><label class="flbl">Type</label><select id="log-type2">${ATTR_TYPES.filter(Boolean).map(a=>`<option>${a}</option>`).join('')}</select></div>
        <div class="fg"><label class="flbl">Exit Date</label><input type="date" id="log-date2" value="${new Date().toISOString().slice(0,10)}"></div>
      </div>
      <div class="fg"><label class="flbl">Reason / Notes</label><textarea id="log-reason2" rows="3"></textarea></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveManualLog()">Log</button></div>
  </div>`);
}
function saveManualLog(){
  const name=document.getElementById('log-name')?.value?.trim();if(!name)return;
  state.attritionLog.unshift({id:uid(),empId:null,name,role:document.getElementById('log-role')?.value||'',leaderId:document.getElementById('log-org')?.value||'',attritionType:document.getElementById('log-type2')?.value||'',exitDate:document.getElementById('log-date2')?.value||'',reason:document.getElementById('log-reason2')?.value||'',loggedAt:new Date().toISOString()});

    </div>
  </div>
  ${relReqs.length>0?`<div class="card"><div class="card-hdr"><span class="card-ttl">Open Reqs (${relReqs.length})</span></div><div class="tbl-wrap"><table><thead><tr><th>Role</th><th>Teams</th><th>Notes</th><th></th></tr></thead><tbody>${reqRows}</tbody></table></div></div>`:''}`;

function tryUnlock(tabId){
  const inp=document.getElementById('pw-inline-'+tabId);if(!inp)return;
  const h=hashStr(inp.value);
  if(h===state.passwords[tabId]||h===state.passwords.admin){state.unlocked[tabId]=true;renderMain();}
  else{inp.style.borderColor='var(--red)';inp.value='';inp.placeholder='Wrong password';setTimeout(()=>{inp.style.borderColor='';inp.placeholder='Password...';},1500);}
}
function toggleUnlock(tabId){
  if(state.unlocked[tabId]){delete state.unlocked[tabId];renderMain();}else showPwModal(tabId);
}

function onBucketChange(idx){
  const c=document.getElementById('f-c'+idx)?.value;

function renderTagDisplay(){return window._modalTags&&window._modalTags.length?window._modalTags.map(t=>`<span class="team-tag">${esc(t)}<button class="rm" onclick="removeTag('${esc(t)}')" type="button">x</button></span>`).join(''):'<span style="font-size:11px;color:var(--g400)">No tags yet</span>';}
function addTagToForm(){const sel=document.getElementById('tag-select');if(!sel)return;const tag=sel.value;if(!tag||(window._modalTags||[]).includes(tag)||(window._modalTags||[]).length>=3)return;(window._modalTags=window._modalTags||[]).push(tag);const d=document.getElementById('tag-display');if(d)d.innerHTML=renderTagDisplay();}
function removeTag(tag){window._modalTags=(window._modalTags||[]).filter(t=>t!==tag);const d=document.getElementById('tag-display');if(d)d.innerHTML=renderTagDisplay();}
function updateWStatus(){
  const w1=parseFloat(document.getElementById('f-w1')?.value)||0;
  const w2=parseFloat(document.getElementById('f-w2')?.value)||0;
  const w3=parseFloat(document.getElementById('f-w3')?.value)||0;
  const tot=w1+w2+w3;
  const s=document.getElementById('w-status'),err=document.getElementById('w-err'),btn=document.getElementById('emp-save-btn');
  const name=document.getElementById('f-name')?.value?.trim();
  if(s){s.textContent=tot+'% / 100%';s.style.color=tot===100?'var(--green)':'var(--red)';}
  if(err)err.style.display=tot!==100?'block':'none';
  if(btn)btn.disabled=!name||tot!==100;
}
function saveEmp(id,leaderId,isNew){
  const name=document.getElementById('f-name')?.value?.trim();
  const w1=parseFloat(document.getElementById('f-w1')?.value)||0;
  const w2=parseFloat(document.getElementById('f-w2')?.value)||0;
  const w3=parseFloat(document.getElementById('f-w3')?.value)||0;
  if(!name||(w1+w2+w3)!==100){updateWStatus();return;}
  const emp={id:isNew?uid():id,leaderId,name,ote:parseFloat(document.getElementById('f-ote')?.value)||null,country:document.getElementById('f-country')?.value||'USA',role:document.getElementById('f-role')?.value||'',level:parseInt(document.getElementById('f-level')?.value)||1,manager:document.getElementById('f-manager')?.value||'',teamTags:[...(window._modalTags||[])],startDate:document.getElementById('f-startdate')?.value||'',performance:document.getElementById('f-perf')?.value||'Good',attrition:document.getElementById('f-attr')?.value||'',onLeave:document.getElementById('f-leave')?.checked||false,notes:document.getElementById('f-notes')?.value||'',
    c1:document.getElementById('f-c1')?.value||'',w1,t1:document.getElementById('f-t1')?.value||'',ch1:document.getElementById('f-ch1')?.value||'',
    c2:document.getElementById('f-c2')?.value||'',w2,t2:document.getElementById('f-t2')?.value||'',ch2:document.getElementById('f-ch2')?.value||'',
    c3:document.getElementById('f-c3')?.value||'',w3,t3:document.getElementById('f-t3')?.value||'',ch3:document.getElementById('f-ch3')?.value||''};
  if(isNew)state.employees.push(emp);else state.employees=state.employees.map(x=>x.id===id?emp:x);
  persist();closeModal();render();
}
function showAddReq(leaderId){
  window._reqTags=[];
  const tagOpts=state.teamTags.filter(t=>t!==DEPT_LEADER_TAG).map(t=>`<option>${esc(t)}</option>`).join('');
  showModal(`<div class="modal modal-sm">
    <div class="modal-hdr"><span class="modal-ttl">Add Open Req</span><button class="modal-x" onclick="closeModal()">x</button></div>
    <div class="modal-body">
      <div class="fg"><label class="flbl">Role *</label><input type="text" id="rq-role" placeholder="e.g. Outbound AE"></div>
      <div style="font-size:10px;font-weight:600;color:var(--g600);text-transform:uppercase;letter-spacing:0.7px;margin-top:4px">Team Tags</div>
      <div id="req-tag-display" style="min-height:22px"><span style="font-size:11px;color:var(--g400)">No tags</span></div>
      <div style="display:flex;gap:6px"><select id="req-tag-sel" style="flex:1">${tagOpts}</select><button type="button" class="btn btn-secondary btn-sm" onclick="addReqTag()">Add</button></div>
      <div class="fg"><label class="flbl">Notes</label><input type="text" id="rq-notes"></div>
    </div>
    <div class="modal-foot"><button class="btn btn-secondary" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="saveReq('${leaderId}')">Add Req</button></div>
  </div>`);
}
function addReqTag(){const sel=document.getElementById('req-tag-sel');if(!sel)return;const tag=sel.value;if(!tag||(window._reqTags||[]).includes(tag))return;(window._reqTags=window._reqTags||[]).push(tag);const d=document.getElementById('req-tag-display');if(d)d.innerHTML=window._reqTags.map(t=>`<span class="team-tag">${esc(t)}</span>`).join('');}
function saveReq(leaderId){const role=document.getElementById('rq-role')?.value?.trim();if(!role)return;state.reqs.push({id:uid(),leaderId,role,teamTags:[...(window._reqTags||[])],notes:document.getElementById('rq-notes')?.value||''});persist();closeModal();render();}
function deleteReq(id){state.reqs=state.reqs.filter(r=>r.id!==id);persist();render();}
function showSettings(){
  const leaders=getLeaders();
  const tagChips=state.teamTags.map(t=>`<span class="tag-chip">${esc(t)}<button class="rm" onclick="removeTeamTag('${esc(t)}')" type="button">x</button></span>`).join('');
  const pwRows=leaders.map(l=>`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="flex:1;font-size:12px;font-weight:500">${esc(l.label)}</span><input type="password" placeholder="New password" id="pw-${l.id}" style="flex:1;padding:5px 8px;font-size:12px"><button class="btn btn-secondary btn-sm" onclick="saveTabPw('${l.id}')">Set</button></div>`).join('');
  showModal(`<div class="modal">
    <div class="modal-hdr"><span class="modal-ttl">Settings</span><button class="modal-x" onclick="closeModal()">x</button></div>
    <div class="modal-body">
      <div class="settings-section">
        <div class="settings-title">Team Tags</div>
        <div id="tag-chips-container" style="margin-bottom:10px">${tagChips}</div>
        <div style="display:flex;gap:6px"><input type="text" id="new-tag-inp" placeholder="New tag..." style="flex:1" onkeydown="if(event.key==='Enter')addTeamTag()"><button class="btn btn-primary btn-sm" onclick="addTeamTag()">Add</button></div>
      </div>
      <div class="settings-section">
        <div class="settings-title">Tab Passwords</div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--g200)">
          <span style="flex:1;font-size:12px;font-weight:600;color:var(--or)">Admin (Settings)</span>
          <input type="password" placeholder="New admin password" id="pw-admin" style="flex:1;padding:5px 8px;font-size:12px">
          <button class="btn btn-secondary btn-sm" onclick="saveTabPw('admin')">Set</button>
        </div>
        ${pwRows}
      </div>
      <div class="settings-section">
        <div class="settings-title">Danger Zone</div>
        <button class="btn btn-secondary btn-sm" onclick="if(confirm('Reset ALL data? Cannot be undone.')){localStorage.clear();location.reload();}">Reset to Seed Data</button>
      </div>
    </div>
    <div class="modal-foot"><button class="btn btn-primary" onclick="closeModal()">Done</button></div>
  </div>`);
}
function addTeamTag(){const inp=document.getElementById('new-tag-inp');const tag=inp?.value?.trim();if(!tag||state.teamTags.includes(tag))return;state.teamTags.push(tag);persist();const c=document.getElementById('tag-chips-container');if(c)c.innerHTML=state.teamTags.map(t=>`<span class="tag-chip">${esc(t)}<button class="rm" onclick="removeTeamTag('${esc(t)}')" type="button">x</button></span>`).join('');if(inp)inp.value='';}
function removeTeamTag(tag){state.teamTags=state.teamTags.filter(t=>t!==tag);persist();const c=document.getElementById('tag-chips-container');if(c)c.innerHTML=state.teamTags.map(t=>`<span class="tag-chip">${esc(t)}<button class="rm" onclick="removeTeamTag('${esc(t)}')" type="button">x</button></span>`).join('');}
function saveTabPw(tabId){const inp=document.getElementById('pw-'+tabId);if(!inp||!inp.value.trim())return;state.passwords[tabId]=hashStr(inp.value.trim());persist();inp.value='';inp.placeholder='Updated';inp.style.borderColor='var(--green)';setTimeout(()=>{inp.placeholder='New password';inp.style.borderColor='';},2000);}
function exportData(){
  const data={version:3,exported:new Date().toISOString(),employees:state.employees,reqs:state.reqs,attritionLog:state.attritionLog,arr:state.arr,dealsTotal:state.dealsTotal,dealsInbound:state.dealsInbound,dealsOutbound:state.dealsOutbound,dealPeriod:state.dealPeriod,perDealCac:state.perDealCac,arpuAvg:state.arpuAvg,arpuInbound:state.arpuInbound,arpuOutbound:state.arpuOutbound,otherGmHitPct:state.otherGmHitPct,teamTags:state.teamTags,passwords:state.passwords};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='MoeGo_GTM_Data_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(url);
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.employees||!data.reqs)throw new Error('Invalid file');
        if(!confirm('Import from '+file.name+'?\n'+data.employees.length+' employees / '+data.reqs.length+' reqs\nExported: '+(data.exported||'unknown')))return;
        state.employees=(data.employees||[]).map(e=>({ch1:'',ch2:'',ch3:'',...e}));
        state.reqs=data.reqs||[];
        state.attritionLog=data.attritionLog||[];
        state.arr=data.arr||state.arr;
        state.dealsTotal=data.dealsTotal||0;
        state.dealsInbound=data.dealsInbound||0;
        state.dealsOutbound=data.dealsOutbound||0;
        state.dealPeriod=data.dealPeriod||'annual';
        state.perDealCac=data.perDealCac||data.otherCac||0;
        state.arpuAvg=data.arpuAvg||0;
        state.arpuInbound=data.arpuInbound||0;
        state.arpuOutbound=data.arpuOutbound||0;
        state.otherGmHitPct=data.otherGmHitPct||0;
        state.teamTags=data.teamTags||state.teamTags;
        if(!state.teamTags.includes('OpEx'))state.teamTags.push('OpEx');
        state.passwords=Object.assign({},DEFAULT_PW,data.passwords||{});
        state.unlocked={};
        persist();render();showToast('Data imported successfully');
      }catch(err){alert('Failed to import: '+err.message);}
    };
    reader.readAsText(file);
  };
  inp.click();
}
function showModal(html){let ov=document.getElementById('modal-overlay');if(ov)ov.remove();ov=document.createElement('div');ov.className='modal-overlay';ov.id='modal-overlay';ov.innerHTML=html;ov.addEventListener('click',e=>{if(e.target===ov)closeModal();});document.body.appendChild(ov);}
function closeModal(){document.getElementById('modal-overlay')?.remove();}
function showToast(msg){const t=document.createElement('div');t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,0.3);pointer-events:none';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
function setSearch(v){state.search=v;renderMain();}
function setFilterPerf(v){state.filterPerf=v;renderMain();}
function setFilterAttr(v){state.filterAttr=v;renderMain();}
render();
</script>
</body>
</html>
